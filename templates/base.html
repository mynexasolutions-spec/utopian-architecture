<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="zxx">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {% block meta %}
    <meta name="description" content="Utopia Furniture & Décor is a premier interior design and custom furniture company based in Muzaffarnagar. We create elegant, functional interiors with international standards." />
    <meta name="keywords" content="interior design, custom furniture, architects, Muzaffarnagar, UP, turnkey interior, residential interior, commercial interior" />
    {% endblock %}
    <meta name="author" content="Utopia Furniture & Décor" />

    <title>{% block title %}Utopia Furniture & Décor | Premium Interior Design{% endblock %}</title>

    <!-- Favicon -->
    <link
      rel="shortcut icon"
      type="image/x-icon"
      href="{{ url_for('static', filename='img/logo/favicon.png') }}"
    />

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}" />
    <!--CSS Plugins-->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/plugin.css') }}" />
    <!--Custom CSS-->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animation.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}" />

    <!-- Font Awesome 4.7.0 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/font-awesome.min.css') }}" />

    <!-- Swiper CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <!-- Page Specific Styles -->
    {% block styles %}{% endblock %}
  </head>
  <body class="{% block body_class %}{% endblock %}">
    
    <!-- LOADER -->
    <div id="loader">
      <div class="loader-circle"></div>
      <div class="loader-line"></div>
    </div>
    
    <!-- Header inclusion -->
    <header class="position-relative" style="z-index: 1050;">
      {% include 'partials/header.html' %}
    </header>

    <!-- Main Content Section -->
    {% block content %}{% endblock %}

    <!-- Footer inclusion -->
    {% include 'partials/footer.html' %}

    <!-- Back-to-top Button start -->
    <div id="back-to-top">
      <a href="#" class="bg-secondary position-relative align-items-center rounded-circle d-block"></a>
    </div>
    <!-- Back-to-top Button end -->

    <!-- Core Scripts -->
    <script src="{{ url_for('static', filename='js/jquery-3.7.1.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/plugin.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script src="{{ url_for('static', filename='js/slider.js') }}"></script>
    <script src="{{ url_for('static', filename='js/animation.js') }}"></script>

    <!-- Page Specific Scripts -->
    {% block scripts %}{% endblock %}

    <script>
      window.addEventListener('load', () => {
          const loader = document.getElementById('loader');
          if (loader) loader.classList.add('hidden');
      });
    </script>
  </body>
</html>
